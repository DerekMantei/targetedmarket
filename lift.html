<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>tm / lift</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Jost:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--ink:#f4f1eb;--mu:#9a948a;--sub:#6b665e;--ac:#b08570;--line:#1d1d1d;--good:#7da87d}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:"Space Mono",ui-monospace,monospace;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:110px}
.bar{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.wm{font-family:"Jost",sans-serif;letter-spacing:.14em;font-size:13px}
.wm .bk{color:var(--ac)}
#vol{font-size:11px;color:var(--sub)}
#vol b{color:var(--ac)}
.head{padding:22px 16px 6px}
.head h1{font-size:24px;font-weight:700;text-transform:lowercase}
.head h1 em{font-style:italic;color:var(--ac)}
.head p{color:var(--sub);font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin-top:4px}
.grp{padding:18px 16px 4px;font-size:11px;letter-spacing:.26em;color:var(--ac);text-transform:uppercase}
.ex{border-top:1px solid var(--line);padding:14px 16px}
.ex.done{opacity:.45}
.ex .top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.ex .nm{font-weight:700;font-size:15px}
.ex .tgt{color:var(--sub);font-size:11px;white-space:nowrap}
.sets{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.set{display:flex;flex-direction:column;align-items:center;gap:4px}
.set input{width:52px;background:#0b0a09;border:1px solid var(--line);color:var(--ink);font-family:inherit;font-size:13px;padding:7px 4px;text-align:center;outline:none}
.set input:focus{border-color:var(--ac)}
.set .tick{width:52px;height:30px;border:1px solid var(--line);background:transparent;color:var(--sub);font-family:inherit;font-size:12px;cursor:pointer}
.set .tick.on{background:var(--ac);color:#000;border-color:var(--ac);font-weight:700}
.addset{border:1px dashed var(--line);background:none;color:var(--sub);font-family:inherit;font-size:16px;width:34px;height:66px;cursor:pointer}
.note{width:100%;margin-top:10px;background:transparent;border:0;border-bottom:1px solid var(--line);color:var(--mu);font-family:inherit;font-size:12px;padding:5px 2px;outline:none}
.note:focus{border-color:var(--ac)}
.cardio{margin:18px 16px;border:1px solid var(--line);padding:16px}
.cardio label{display:flex;gap:10px;align-items:center;font-size:13px;cursor:pointer}
.foot{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:1px solid var(--line);display:flex;gap:1px}
.foot>*{flex:1;padding:16px 8px;text-align:center;background:#000;border:0;color:var(--ink);font-family:inherit;font-size:13px;cursor:pointer}
#rest{color:var(--ac);font-weight:700}
#rest.running{background:var(--ac);color:#000}
#finish{color:var(--good)}
#summary{display:none;padding:20px 16px;border-top:1px solid var(--ac);white-space:pre-wrap;font-size:12px;color:var(--mu)}
#summary b{color:var(--ac)}
</style>
</head>
<body>
<div class="bar">
  <span class="wm"><span class="bk">[</span>tm<span class="bk">]</span> lift</span>
  <span id="vol">volume <b>0</b> lb</span>
</div>
<div class="head">
  <h1>monday · <em>a little of everything.</em></h1>
  <p id="dt"></p>
</div>
<div id="list"></div>
<div class="cardio">
  <label><input type="checkbox" id="cardio"> optional finisher: 12 min incline walk · leave a little in the tank, doors tomorrow</label>
</div>
<div id="summary"></div>
<div class="foot">
  <button id="rest">rest 90s</button>
  <button id="finish">finish + log</button>
</div>

<script>
var KEY='tmlift-'+new Date().toISOString().slice(0,10);
document.getElementById('dt').textContent=new Date().toDateString().toLowerCase()+' · push + arms + abs · no back';
var PLAN=[
 {g:'chest',ex:[
  {n:'incline db press',t:'4 × 8–10',s:4},
  {n:'chest flys',t:'3 × 12',s:3}]},
 {g:'shoulders',ex:[
  {n:'seated db press',t:'3 × 8–10',s:3},
  {n:'lateral raises',t:'3 × 12–15',s:3}]},
 {g:'biceps',ex:[
  {n:'db curls',t:'3 × 10–12',s:3},
  {n:'hammer curls',t:'2 × 12',s:2}]},
 {g:'triceps',ex:[
  {n:'rope pushdowns',t:'3 × 12',s:3},
  {n:'overhead extension',t:'2 × 12',s:2}]},
 {g:'abs',ex:[
  {n:'ab roller',t:'3 × 8–12',s:3},
  {n:'leg raises',t:'3 × 15',s:3}]}
];
var db=JSON.parse(localStorage.getItem(KEY)||'{}');
function save(){localStorage.setItem(KEY,JSON.stringify(db));volume()}
function volume(){var v=0;Object.values(db).forEach(function(e){(e.sets||[]).forEach(function(s){if(s.on)v+=(+s.w||0)*(+s.r||0)})});document.getElementById('vol').innerHTML='volume <b>'+v.toLocaleString()+'</b> lb';return v}
var list=document.getElementById('list');
PLAN.forEach(function(grp){
 var h=document.createElement('div');h.className='grp';h.textContent=grp.g;list.appendChild(h);
 grp.ex.forEach(function(ex){
  var id=ex.n.replace(/\W/g,'_');
  db[id]=db[id]||{sets:Array.from({length:ex.s},function(){return{w:'',r:'',on:false}}),note:''};
  var el=document.createElement('div');el.className='ex';el.id='ex_'+id;
  el.innerHTML='<div class="top"><span class="nm">'+ex.n+'</span><span class="tgt">'+ex.t+'</span></div>';
  var row=document.createElement('div');row.className='sets';
  function renderSets(){
   row.innerHTML='';
   db[id].sets.forEach(function(s,i){
    var d=document.createElement('div');d.className='set';
    var w=document.createElement('input');w.placeholder='lb';w.inputMode='decimal';w.value=s.w;
    var r=document.createElement('input');r.placeholder='reps';r.inputMode='numeric';r.value=s.r;
    var t=document.createElement('button');t.className='tick'+(s.on?' on':'');t.textContent=s.on?'✓':'set '+(i+1);
    w.oninput=function(){s.w=w.value;save()};
    r.oninput=function(){s.r=r.value;save()};
    t.onclick=function(){s.on=!s.on;save();renderSets();doneCheck()};
    d.appendChild(w);d.appendChild(r);d.appendChild(t);row.appendChild(d);
   });
   var add=document.createElement('button');add.className='addset';add.textContent='+';
   add.onclick=function(){db[id].sets.push({w:'',r:'',on:false});save();renderSets()};
   row.appendChild(add);
  }
  function doneCheck(){el.className='ex'+(db[id].sets.length&&db[id].sets.every(function(s){return s.on})?' done':'')}
  renderSets();doneCheck();
  var note=document.createElement('input');note.className='note';note.placeholder='note (felt heavy, pr, swap…)';note.value=db[id].note;
  note.oninput=function(){db[id].note=note.value;save()};
  el.appendChild(row);el.appendChild(note);list.appendChild(el);
 });
});
volume();
document.getElementById('cardio').checked=!!db.__cardio;
document.getElementById('cardio').onchange=function(e){db.__cardio=e.target.checked;save()};
/* rest timer */
var rb=document.getElementById('rest'),ti=null,left=0;
rb.onclick=function(){
 if(ti){clearInterval(ti);ti=null;rb.className='';rb.textContent='rest 90s';return}
 left=90;rb.className='running';
 ti=setInterval(function(){left--;rb.textContent=left+'s';
  if(left<=0){clearInterval(ti);ti=null;rb.className='';rb.textContent='rest 90s';
   if(navigator.vibrate)navigator.vibrate([200,100,200])}},1000);
};
/* finish */
document.getElementById('finish').onclick=function(){
 var lines=[],total=0,setsDone=0;
 PLAN.forEach(function(g){g.ex.forEach(function(ex){
  var id=ex.n.replace(/\W/g,'_'),e=db[id];
  var done=e.sets.filter(function(s){return s.on});
  if(done.length){setsDone+=done.length;
   lines.push(ex.n+': '+done.map(function(s){return (s.w||'bw')+'×'+(s.r||'?')}).join(', ')+(e.note?' — '+e.note:''))}
 })});
 var v=volume();
 var out='monday push — '+new Date().toDateString().toLowerCase()+'\n'+setsDone+' sets · '+v.toLocaleString()+' lb total volume'+(db.__cardio?' · +12min incline walk':'')+'\n\n'+lines.join('\n')+'\n\ntell claude: "log workout: '+setsDone+' sets, '+v.toLocaleString()+' lb volume"';
 var s=document.getElementById('summary');s.style.display='block';s.textContent=out;
 navigator.clipboard&&navigator.clipboard.writeText(out).catch(function(){});
 s.scrollIntoView({behavior:'smooth'});
};
</script>
</body>
</html>
