<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>tm / field</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Jost:wght@400&display=swap" rel="stylesheet">
<style>
:root{--bg:#000;--ink:#f4f1eb;--mu:#9a948a;--sub:#6b665e;--ac:#b08570;--line:#1d1d1d;--good:#7da87d;--warn:#c9a227}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:"Space Mono",ui-monospace,monospace;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;padding-bottom:80px}
.bar{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.wm{font-family:"Jost",sans-serif;letter-spacing:.14em;font-size:13px}
.wm .bk{color:var(--ac)}
.stats{font-size:10px;color:var(--sub);letter-spacing:.1em}
.stats b{color:var(--ac)}
.ctrl{padding:14px 16px;display:flex;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
button{background:transparent;border:1px solid var(--line);color:var(--mu);font-family:inherit;font-size:12px;padding:10px 14px;cursor:pointer}
button.on{border-color:var(--ac);color:var(--ac)}
button.big{border-color:var(--ac);color:var(--ac);flex:1;padding:14px;font-size:13px;letter-spacing:.06em}
button:active{background:var(--ac);color:#000}
select{background:#0a0a0a;border:1px solid var(--line);color:var(--mu);font-family:inherit;font-size:12px;padding:10px}
#msg{padding:12px 16px;font-size:12px;color:var(--sub)}
#msg.err{color:#c96a4a}
.biz{border-bottom:1px solid var(--line);padding:14px 16px}
.biz .top{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.biz .nm{font-weight:700;font-size:15px}
.biz .dist{color:var(--sub);font-size:11px;white-space:nowrap}
.biz .cat{color:var(--sub);font-size:11px;letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.row2{display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap}
.status{border:1px solid var(--line);padding:7px 12px;font-size:11px;letter-spacing:.08em;cursor:pointer;user-select:none}
.s-new{color:var(--sub)}
.s-walked{color:var(--ink);border-color:var(--ink)}
.s-statement{color:var(--warn);border-color:var(--warn)}
.s-followup{color:var(--ac);border-color:var(--ac)}
.s-boarded{color:var(--good);border-color:var(--good)}
.s-dead{color:#5a3d33;border-color:#5a3d33;text-decoration:line-through}
.navlink{font-size:11px;color:var(--mu);border:1px solid var(--line);padding:7px 12px;text-decoration:none}
input.note{flex:1;min-width:120px;background:transparent;border:0;border-bottom:1px solid var(--line);color:var(--ink);font-family:inherit;font-size:12px;padding:6px 2px;outline:none}
input.note:focus{border-color:var(--ac)}
.foot{position:fixed;bottom:0;left:0;right:0;display:flex;gap:1px;background:var(--line);border-top:1px solid var(--line)}
.foot button{flex:1;background:#000;border:0;padding:16px;font-size:12px}
</style>
</head>
<body>
<div class="bar">
  <span class="wm"><span class="bk">[</span>tm<span class="bk">]</span> field</span>
  <span class="stats" id="stats">no data yet</span>
</div>

<div class="ctrl">
  <button class="big" id="locate">📍 find businesses near me</button>
  <select id="radius"><option value="500">500m</option><option value="1000" selected>1km</option><option value="2000">2km</option><option value="4000">4km</option></select>
</div>
<div class="ctrl" id="cats"></div>
<div id="msg">tap the button. allow location. work the list. every tap is saved on this phone.</div>
<div id="list"></div>

<div class="foot">
  <button id="mine">my pipeline</button>
  <button id="export">export csv</button>
</div>

<script>
var CATS={
 'auto':'nwr["shop"~"car_repair|car|tyres"](around:{R},{LL});',
 'barber/salon':'nwr["shop"~"hairdresser|beauty"](around:{R},{LL});',
 'coffee':'nwr["amenity"="cafe"](around:{R},{LL});',
 'restaurant':'nwr["amenity"~"restaurant|fast_food|bar"](around:{R},{LL});',
 'fitness':'nwr["leisure"="fitness_centre"](around:{R},{LL});',
 'retail':'nwr["shop"~"convenience|clothes|gift|pet|florist|jewelry|shoes|vape|tobacco"](around:{R},{LL});'
};
var active=Object.keys(CATS).reduce(function(o,k){o[k]=true;return o},{});
var STATUSES=['new','walked','statement','follow-up','boarded','dead'];
var db=JSON.parse(localStorage.getItem('tmfield')||'{}');
var results=[];

var catBox=document.getElementById('cats');
Object.keys(CATS).forEach(function(c){
  var b=document.createElement('button');b.textContent=c;b.className='on';
  b.onclick=function(){active[c]=!active[c];b.className=active[c]?'on':'';};
  catBox.appendChild(b);
});

function save(){localStorage.setItem('tmfield',JSON.stringify(db));stats();}
function stats(){
  var vals=Object.values(db);
  var w=vals.filter(function(x){return x.s&&x.s!=='new'}).length;
  var st=vals.filter(function(x){return x.s==='statement'||x.s==='follow-up'}).length;
  var bd=vals.filter(function(x){return x.s==='boarded'}).length;
  document.getElementById('stats').innerHTML='touched <b>'+w+'</b> · live <b>'+st+'</b> · boarded <b>'+bd+'</b>';
}
stats();

function dist(a,b,c,d){var R=6371e3,p=Math.PI/180;var x=(c-a)*p,y=(d-b)*p;var h=Math.sin(x/2)**2+Math.cos(a*p)*Math.cos(c*p)*Math.sin(y/2)**2;return 2*R*Math.asin(Math.sqrt(h));}

document.getElementById('locate').onclick=function(){
  var msg=document.getElementById('msg');msg.className='';msg.textContent='getting location…';
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=pos.coords.latitude,lon=pos.coords.longitude;
    msg.textContent='scanning businesses… (10-20 sec)';
    var R=document.getElementById('radius').value;
    var LL=lat+','+lon;
    var q='[out:json][timeout:25];(';
    Object.keys(CATS).forEach(function(c){if(active[c])q+=CATS[c].replace('{R}',R).replace('{LL}',LL);});
    q+=');out center 120;';
    fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(q)})
    .then(function(r){return r.json()})
    .then(function(j){
      results=j.elements.filter(function(e){return e.tags&&e.tags.name}).map(function(e){
        var la=e.lat||e.center.lat, lo=e.lon||e.center.lon;
        var cat=e.tags.shop||e.tags.amenity||e.tags.leisure||'biz';
        return {id:'osm'+e.id,name:e.tags.name,cat:cat,lat:la,lon:lo,d:dist(lat,lon,la,lo),phone:e.tags.phone||e.tags['contact:phone']||''};
      }).sort(function(a,b){return a.d-b.d});
      msg.textContent=results.length+' businesses found. closest first. tap status to advance.';
      render(results);
    }).catch(function(){msg.className='err';msg.textContent='scan failed — overpass may be busy. try again in 30 sec.';});
  },function(){msg.className='err';msg.textContent='location denied. enable location for this site in browser settings.';},{enableHighAccuracy:true,timeout:15000});
};

function render(items){
  var list=document.getElementById('list');list.innerHTML='';
  items.forEach(function(b){
    var rec=db[b.id]||{s:'new',n:''};
    var el=document.createElement('div');el.className='biz';
    var dtxt=b.d?(b.d<1000?Math.round(b.d)+'m':(b.d/1000).toFixed(1)+'km'):'';
    el.innerHTML='<div class="top"><span class="nm">'+b.name+'</span><span class="dist">'+dtxt+'</span></div>'+
      '<div class="cat">'+b.cat.replace(/_/g,' ')+(b.phone?' · '+b.phone:'')+'</div>';
    var row=document.createElement('div');row.className='row2';
    var st=document.createElement('span');st.className='status s-'+rec.s.replace('-','');st.textContent=rec.s;
    st.className='status s-'+rec.s.replace('follow-up','followup');
    st.onclick=function(){
      var i=(STATUSES.indexOf(rec.s)+1)%STATUSES.length;rec.s=STATUSES[i];
      db[b.id]={s:rec.s,n:rec.n,name:b.name,cat:b.cat,t:Date.now()};save();
      st.textContent=rec.s;st.className='status s-'+rec.s.replace('follow-up','followup');
    };
    var nav=document.createElement('a');nav.className='navlink';nav.textContent='route →';
    nav.href='https://www.google.com/maps/dir/?api=1&destination='+b.lat+','+b.lon;nav.target='_blank';
    var note=document.createElement('input');note.className='note';note.placeholder='note (owner name, next step…)';note.value=rec.n||'';
    note.onchange=function(){rec.n=note.value;db[b.id]={s:rec.s,n:rec.n,name:b.name,cat:b.cat,t:Date.now()};save();};
    row.appendChild(st);row.appendChild(nav);row.appendChild(note);
    el.appendChild(row);list.appendChild(el);
  });
}

document.getElementById('mine').onclick=function(){
  var mine=Object.keys(db).map(function(k){var r=db[k];return {id:k,name:r.name||k,cat:r.cat||'',d:0,lat:0,lon:0,phone:''}});
  var withPos=mine.map(function(m){var f=results.find(function(r){return r.id===m.id});return f||m;});
  document.getElementById('msg').textContent=withPos.length+' businesses in your pipeline.';
  render(withPos);
};

document.getElementById('export').onclick=function(){
  var rows=[['name','category','status','note','updated']];
  Object.keys(db).forEach(function(k){var r=db[k];rows.push([r.name||k,r.cat||'',r.s,String(r.n||'').replace(/,/g,';'),new Date(r.t||Date.now()).toLocaleDateString()]);});
  var csv=rows.map(function(r){return r.join(',')}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='tm-field-pipeline.csv';a.click();
};
</script>
</body>
</html>
